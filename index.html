<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#187a4a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHTC">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>CHTC Hockey</title>
<style>
  :root{
    /* CHTC-Vereinsfarben (aus dem Logo): Grün & Rot */
    --primary:#187a4a; --primary-dark:#0f5c37; --primary-light:#219660; --accent:#e63f2a;
    --bg:#f4f5f4; --card:#fff; --text:#1a1a1a; --muted:#6b7280;
    --win:#16a34a; --loss:#dc2626; --draw:#6b7280;
    --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,'Segoe UI',Roboto,sans-serif;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);overflow:hidden}
  /* Fester Rahmen: Kopf + Reiter bleiben stehen, nur der Inhalt scrollt */
  #app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  header{background:var(--primary);color:#fff;padding:calc(var(--sat) + 14px) 16px 12px;flex-shrink:0;z-index:5;border-bottom:3px solid var(--accent)}
  header h1{font-size:19px;font-weight:700}
  .brand{display:flex;align-items:center;gap:10px}
  .brand img{width:36px;height:36px;border-radius:50%;background:#fff}
  .info-btn{margin-left:auto;width:30px;height:30px;border-radius:50%;border:2px solid #fff;background:none;color:#fff;font-weight:700;font-size:16px;font-family:Georgia,'Times New Roman',serif;font-style:italic;cursor:pointer;flex-shrink:0;line-height:1}
  header .sub{font-size:12px;opacity:.75;margin-top:2px}
  .back{background:none;border:none;color:#fff;font-size:15px;padding:0 0 6px;cursor:pointer;opacity:.9}
  .content{padding:14px 14px calc(var(--sab) + 20px);flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;max-width:560px;width:100%;margin:0 auto}
  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:14px 4px 6px}
  .card{background:var(--card);border-radius:14px;padding:13px 14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .tappable{cursor:pointer;transition:transform .08s}
  .tappable:active{transform:scale(.98)}
  .team-row{display:flex;align-items:center;gap:12px}
  .badge{min-width:44px;height:38px;padding:0 6px;border-radius:10px;background:var(--primary-dark);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
  .badge.j{background:var(--accent)}
  .team-row .info{flex:1;min-width:0}
  .team-row .name{font-weight:600;font-size:15px}
  .team-row .liga{font-size:12px;color:var(--muted)}
  .star{color:#d1d5db;font-size:20px;background:none;border:none;cursor:pointer;padding:4px}
  .star.on{color:var(--accent)}
  .fav-card{border-left:4px solid var(--accent)}
  .nextline{font-size:12.5px;color:var(--muted);margin-top:5px}
  .pill{display:inline-block;font-size:10.5px;font-weight:700;color:var(--primary-dark);background:#e4f2ea;border-radius:8px;padding:2px 8px;margin-top:6px}
  .tabs{display:flex;background:var(--primary);flex-shrink:0;z-index:4}
  .tabs button{flex:1;padding:11px 4px;background:none;border:none;color:rgba(255,255,255,.65);font-size:12.5px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent}
  .tabs button.on{color:#fff;border-bottom-color:var(--accent)}
  .match{display:flex;align-items:center;gap:10px}
  .match .date{width:54px;text-align:center;flex-shrink:0}
  .match .date .d{font-weight:700;font-size:14px}
  .match .date .m{font-size:10.5px;color:var(--muted);text-transform:uppercase}
  .match .vs{flex:1;min-width:0}
  .match .vs .opp{font-weight:600;font-size:13.5px}
  .match .vs .where{font-size:11.5px;color:var(--muted)}
  .score{font-weight:700;font-size:15px}
  .score.w{color:var(--win)}.score.l{color:var(--loss)}.score.d{color:var(--draw)}
  .time{font-size:13px;font-weight:600;color:var(--primary)}
  table{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  th{background:#eef1ef;color:var(--muted);font-size:10.5px;text-transform:uppercase;padding:8px 5px;text-align:center}
  th:nth-child(2){text-align:left}
  td{padding:8px 5px;text-align:center;border-top:1px solid #f0f2f0}
  td:nth-child(2){text-align:left;font-weight:500}
  tr.me{background:#e9f2ec;font-weight:700}
  .train .day{font-weight:700;font-size:14px;color:var(--primary)}
  .train .tinfo{font-size:13px;margin-top:2px}
  .train .tplace{font-size:12px;color:var(--muted);margin-top:1px}
  .detail-hero{background:var(--primary);color:#fff;padding:18px 16px;border-radius:14px;text-align:center;margin-bottom:10px}
  .detail-hero .teams{font-size:16px;font-weight:700}
  .detail-hero .when{font-size:13px;opacity:.85;margin-top:6px}
  .label{font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:.06em}
  .a{font-size:14px;margin-top:4px;line-height:1.45}
  .btnrow{display:flex;gap:8px;margin-top:10px}
  .btn{flex:1;padding:12px;border:none;border-radius:11px;font-size:13.5px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;color:inherit;display:block}
  .btn.p{background:var(--primary);color:#fff}
  .btn.s{background:#e5e9e6;color:var(--primary)}
  .hint{font-size:11px;color:var(--muted);text-align:center;margin:10px 0 4px}
  .empty{text-align:center;color:var(--muted);font-size:13.5px;padding:30px 20px;line-height:1.6}
  .banner{background:#fffbe8;border:1px solid #e8d78a;border-radius:12px;padding:10px 12px;font-size:12.5px;color:#57430a;margin-bottom:10px;line-height:1.45}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";

/* ================= Betrieb =================
   Die App lädt ihre Daten aus data.json (siehe unten am Dateiende).
   data.json wird automatisch per GitHub Actions von hockey.de aktualisiert. */

/* ================= Eingebaute Daten (Echtdaten wU12, Stand 18.07.2026) ================= */
const DATA = {

  ],

    { d:"2026-05-03", heim:"HTC Uhlenhorst Mülheim", gast:"Crefelder HTC", h:false, th:1, tg:4, ort:"muelheim" },

    { d:"2026-06-28", heim:"Marienburger SC", gast:"Crefelder HTC", h:false, th:1, tg:7, ort:"msc" },

    { d:"2026-07-12", heim:"Düsseldorfer SC", gast:"Crefelder HTC", h:false, th:0, tg:4, ort:"dsc99" },
    { d:"2026-09-13", zeit:"14:00", heim:"Crefelder HTC", gast:"Rot-Weiss Köln", h:true, ort:"gwa",
      hinweis:"Spitzenspiel: Tabellenführer CHTC (24 Pkt.) empfängt den Vierten Rot-Weiss Köln (18 Pkt.)." },
    { d:"2026-09-20", zeit:"12:00", heim:"Crefelder HTC", gast:"Schwarz-Weiß Köln 1", h:true, ort:"gwa" },
    { d:"2026-09-27", heim:"Club Raffelberg", gast:"Crefelder HTC", h:false, ort:"raffelberg" }
  ]},

    [2,"DSD Düsseldorf",8,7,0,1,"34:6",21],
    [3,"HTC Uhlenhorst Mülheim",8,6,1,1,"25:7",19],
    [4,"Rot-Weiss Köln",8,6,0,2,"29:8",18],
    [5,"Düsseldorfer HC",8,5,0,3,"21:9",15],
    [6,"Blau-Weiß Köln",8,5,0,3,"22:11",15],
    [7,"Gladbacher HTC",8,3,1,4,"12:17",10],
    [8,"HTC Schwarz-Weiß Neuss",9,3,0,6,"13:19",9],
    [9,"Schwarz-Weiß Köln 1",9,2,2,5,"13:34",8],
    [10,"Club Raffelberg",9,1,2,6,"15:28",5],
    [11,"Marienburger SC",8,1,2,5,"6:23",5],
    [12,"Düsseldorfer SC",8,1,2,5,"6:26",5],
    [13,"ETB Essen",8,0,2,6,"3:34",2]
  ]},
  trainings: {
    "wu12": [
      { tag:"Dienstag",   von:"16:00", bis:"17:30", ort:"Platz Tokio, Gerd-Wellen-Anlage" },
      { tag:"Donnerstag", von:"15:30", bis:"17:00", ort:"Platz Tokio, Gerd-Wellen-Anlage" },
      { tag:"Freitag",    von:"16:30", bis:"18:00", ort:"Platz Paris, Gerd-Wellen-Anlage", info:"nur wU12-1" }
    ],
    "wu12-2": [
      { tag:"Dienstag",   von:"16:00", bis:"17:30", ort:"Platz Tokio, Gerd-Wellen-Anlage" },
      { tag:"Donnerstag", von:"15:30", bis:"17:00", ort:"Platz Tokio, Gerd-Wellen-Anlage" }
    ],
    "wu12-3": [
      { tag:"Dienstag",   von:"16:00", bis:"17:30", ort:"Platz Tokio, Gerd-Wellen-Anlage" },
      { tag:"Donnerstag", von:"15:30", bis:"17:00", ort:"Platz Tokio, Gerd-Wellen-Anlage" }
    ]
  },
  infos: {
    platz: { name:"Gerd-Wellen-Hockeyanlage", strasse:"Hüttenallee 256", ort:"47800 Krefeld",
             maps:"Gerd-Wellen-Hockeyanlage, Hüttenallee 256, Krefeld" },
    bar:  { titel:"Hockeybar",
            zeiten:[["Montag","15:00 – 18:30 Uhr"],["Mittwoch","15:00 – 19:00 Uhr"],["Freitag","15:00 – 19:00 Uhr"]],
            kontakt:"hockeybar@chtc.de" },
    shops: [
      { titel:"CHTC Hockeyshop (Der Hockeykrauss)", adresse:"Friedrich-Ebert-Str. 174, Krefeld-Bockum",
        zeiten:[["Montag","16:00 – 18:00 Uhr"],["Dienstag","15:30 – 17:30 Uhr"],["Mittwoch","15:00 – 18:00 Uhr"],["Donnerstag","16:00 – 18:00 Uhr"],["Samstag","10:00 – 13:00 Uhr"]],
        kontakt:"achim.krauss@gmx.de", hinweis:"Zeiten Winter 2025/26 — Änderungen vorbehalten" },
      { titel:"Backhandshot", adresse:"Stephanstraße 15, 47799 Krefeld",
        zeiten:[["Montag – Freitag","10:00 – 18:00 Uhr"],["Samstag","10:00 – 15:00 Uhr"]],
        kontakt:"daily@backhandshot.com" }
    ]
  },
  venues: {
    gwa:        { name:"Gerd-Wellen-Hockeyanlage", adresse:"Hüttenallee 256", ort:"47800 Krefeld", maps:"Gerd-Wellen-Hockeyanlage, Hüttenallee 256, Krefeld" },
    muelheim:   { name:"Sportanlage Uhlenhorst", ort:"Mülheim an der Ruhr", maps:"HTC Uhlenhorst Mülheim" },
    gladbach:   { name:"Anlage Gladbacher HTC", ort:"Mönchengladbach", maps:"Gladbacher HTC" },
    dsd:        { name:"Sportanlage DSD", ort:"Düsseldorf", maps:"DSD Düsseldorf Hockey" },
    msc:        { name:"Anlage Marienburger SC", ort:"Köln", maps:"Marienburger SC Köln" },
    dsc99:      { name:"Anlage DSC 99", ort:"Düsseldorf", maps:"Düsseldorfer SC 99 Hockey" },
    raffelberg: { name:"Anlage Club Raffelberg", ort:"Duisburg", maps:"Club Raffelberg Duisburg" }
  },
  stand: "18.07.2026"
};

/* ================= Helpers ================= */
const $ = (s) => document.querySelector(s);
const MON = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
const WTAGE = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function store(key, val) { try { if (val === undefined) return JSON.parse(localStorage.getItem(key)); localStorage.setItem(key, JSON.stringify(val)); } catch { return null; } }
let favs = store("chtc_favs") || ["wu12"];

const dOf = (m) => new Date(m.d + "T" + (m.zeit || "23:59"));
const played = (m) => m.th !== undefined;
const chtcWon = (m) => played(m) && ((m.h && m.th > m.tg) || (!m.h && m.tg > m.th));
const chtcLost = (m) => played(m) && ((m.h && m.th < m.tg) || (!m.h && m.tg < m.th));

function nextMatch(teamId) {
  const now = new Date();
  return (DATA.matches[teamId] || []).filter(m => !played(m) && dOf(m) >= now)[0];
}

/* ================= Views ================= */
function render(html) {
  $("#app").innerHTML = html;
  const c = $(".content");
  if (c) c.scrollTop = 0;
}

function homeView() {
  const teamCard = (t, fav) => {
    const nm = t.live ? nextMatch(t.id) : null;
    const st = t.live ? (DATA.standings[t.id] || []).find(r => r[8]) : null;
    return `<div class="card tappable ${fav ? "fav-card" : ""}" onclick="openTeam('${t.id}')">
      <div class="team-row">
        <div class="badge ${t.jugend ? "j" : ""}">${esc(t.badge)}</div>
        <div class="info"><div class="name">${esc(t.name)}</div><div class="liga">${esc(t.liga)}</div></div>
        <button class="star ${favs.includes(t.id) ? "on" : ""}" onclick="toggleFav(event,'${t.id}')">★</button>
      </div>
      ${nm ? `<div class="nextline">Nächstes Spiel: ${fmtShort(nm)}</div>` : ""}
      ${st ? `<span class="pill">Platz ${st[0]} · ${st[7]} Punkte</span>` : ""}
    </div>`;
  };
  const favTeams = DATA.teams.filter(t => favs.includes(t.id));
  const rest = DATA.teams.filter(t => !favs.includes(t.id));
  const gruppeVon = (t) => t.gruppe || (t.jugend ? "Jugend" : "Erwachsene");
  const gruppen = [];
  for (const t of rest) {
    const g = gruppeVon(t);
    if (!gruppen.includes(g)) gruppen.push(g);
  }
  const sektionen = gruppen.map(g =>
    `<div class="section-label">${esc(g)}</div>` +
    rest.filter(t => gruppeVon(t) === g).map(t => teamCard(t)).join("")
  ).join("");
  render(`
    <header><div class="brand"><img src="logo-header.png" alt=""><div><h1>CHTC Hockey</h1><div class="sub">Crefelder Hockey- und Tennis-Club 1890</div></div><button class="info-btn" onclick="infoView()" aria-label="Vereins-Infos">i</button></div></header>
    <div class="content">
      ${favTeams.length ? `<div class="section-label">★ Meine Teams</div>` + favTeams.map(t => teamCard(t, true)).join("") : ""}
      ${sektionen}
      <div class="hint">Daten: hockey.de · Stand ${DATA.stand}</div>
    </div>`);
}

function fmtShort(m) {
  const d = new Date(m.d + "T12:00");
  return `${WTAGE[d.getDay()].slice(0,2)} ${String(d.getDate()).padStart(2,"0")}.${String(d.getMonth()+1).padStart(2,"0")}.` +
         (m.zeit ? ` · ${m.zeit}` : "") + ` · ${m.h ? "Heim vs. " + m.gast : "@ " + m.heim}`;
}

let curTab = "spiele";
function teamView(teamId, tab) {
  curTab = tab || "spiele";
  const t = DATA.teams.find(x => x.id === teamId);
  const matches = DATA.matches[teamId] || [];
  const tabBtn = (id, label) => `<button class="${curTab === id ? "on" : ""}" onclick="openTeam('${teamId}','${id}')">${label}</button>`;

  let body = "";
  if (!t.live && curTab !== "training") {
    body = `<div class="empty">Für dieses Team liegen noch keine Spieldaten vor.<br><br>Sie erscheinen automatisch, sobald das nächste Daten-Update sie auf hockey.de findet.</div>`;
  } else if (curTab === "spiele") {
    body = matches.map((m, i) => matchCard(teamId, m, i)).join("") +
           `<div class="hint">Echte Daten: hockey.de · Stand ${DATA.stand}</div>`;
  } else if (curTab === "tabelle") {
    const rows = (DATA.standings[teamId] || []).map(r =>
      `<tr class="${r[8] ? "me" : ""}"><td>${r[0]}</td><td>${esc(r[1])}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td><td>${r[6]}</td><td>${r[7]}</td></tr>`).join("");
    body = `<table><tr><th>#</th><th>Mannschaft</th><th>Sp</th><th>S</th><th>U</th><th>N</th><th>Tore</th><th>Pkt</th></tr>${rows}</table>
            <div class="hint">${esc(t.liga)} · Stand ${DATA.stand}</div>`;
  } else if (curTab === "next") {
    const up = matches.map((m, i) => [m, i]).filter(([m]) => !played(m));
    body = up.length ? up.map(([m, i]) => matchCard(teamId, m, i)).join("") : `<div class="empty">Keine anstehenden Spiele.</div>`;
  } else {
    const tr = DATA.trainings[teamId] || [];
    body = (tr.length ? tr.map(x => `<div class="card train"><div class="day">${esc(x.tag)}</div>
        <div class="tinfo">${esc(x.von)} – ${esc(x.bis)} Uhr</div>
        <div class="tplace">${esc(x.ort)}${x.info ? " · " + esc(x.info) : ""}</div></div>`).join("")
      : `<div class="empty">Noch keine Trainingszeiten hinterlegt.</div>`);
  }

  render(`
    <header><button class="back" onclick="homeView()">‹ Teams</button>
      <h1>${esc(t.name)}</h1><div class="sub">${esc(t.liga)}</div></header>
    <div class="tabs">${tabBtn("spiele","Spiele")}${tabBtn("tabelle","Tabelle")}${tabBtn("next","Nächste")}${tabBtn("training","Training")}</div>
    <div class="content">${body}</div>`);
}

function matchCard(teamId, m, i) {
  const d = new Date(m.d + "T12:00");
  const right = played(m)
    ? `<div class="score ${chtcWon(m) ? "w" : chtcLost(m) ? "l" : "d"}">${m.th} : ${m.tg}</div>`
    : `<div class="time">${m.zeit || "–"}</div>`;
  const v = DATA.venues[m.ort];
  const sub = played(m) ? (m.h ? "Heim" : "Auswärts")
                        : `${v ? esc(v.name) + ", " + esc((v.ort || "").replace(/^\d+\s*/, ""))
                              : (m.ortName ? esc(m.ortName) : (m.h ? "Heim" : "Auswärts"))}`;
  return `<div class="card tappable" onclick="detailView('${teamId}',${i})">
    <div class="match">
      <div class="date"><div class="d">${String(d.getDate()).padStart(2,"0")}</div><div class="m">${MON[d.getMonth()]}</div></div>
      <div class="vs"><div class="opp">${esc(short(m.heim))} – ${esc(short(m.gast))}</div><div class="where">${sub}</div></div>
      ${right}</div></div>`;
}
const short = (n) => n.replace("Crefelder HTC", "CHTC").replace("HTC Uhlenhorst Mülheim", "Uhlenhorst Mülheim");

function detailView(teamId, i) {
  const t = DATA.teams.find(x => x.id === teamId);
  const m = DATA.matches[teamId][i];
  const v = DATA.venues[m.ort] || (m.ortName ? { name: m.ortName, maps: m.ortName } : {});
  const d = new Date(m.d + "T12:00");
  const when = `${WTAGE[d.getDay()]}, ${d.getDate()}. ${["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"][d.getMonth()]} ${d.getFullYear()}` + (m.zeit ? ` · ${m.zeit} Uhr` : " · Uhrzeit folgt");
  const mapsQ = encodeURIComponent(v.maps || v.name || "");
  const result = played(m) ? `<div style="font-size:26px;font-weight:800;margin-top:8px">${m.th} : ${m.tg}</div>` : "";
  render(`
    <header><button class="back" onclick="openTeam('${teamId}','${curTab}')">‹ ${esc(t.name)}</button>
      <h1>${m.h ? "Heimspiel" : "Auswärtsspiel"}</h1><div class="sub">${esc(t.liga)}</div></header>
    <div class="content">
      <div class="detail-hero"><div class="teams">${esc(m.heim)} – ${esc(m.gast)}</div><div class="when">${when}</div>${result}</div>
      <div class="card"><div class="label">Spielort</div>
        <div class="a"><strong>${esc(v.name || "Wird noch bekannt gegeben")}</strong>${v.adresse ? "<br>" + esc(v.adresse) : ""}${v.ort ? "<br>" + esc(v.ort) : ""}</div>
        ${v.name ? `<div class="btnrow">
          <a class="btn p" target="_blank" rel="noopener" href="https://maps.apple.com/?q=${mapsQ}">🧭 Route öffnen</a>
          ${!played(m) ? `<a class="btn s" href="${icsUrl(m, v)}" download="chtc-spiel.ics">📅 In Kalender</a>` : ""}
        </div>` : ""}</div>
      ${m.hinweis ? `<div class="card"><div class="label">Info</div><div class="a">${esc(m.hinweis)}</div></div>` : ""}
    </div>`);
}

function icsUrl(m, v) {
  const dt = m.d.replace(/-/g, "");
  const start = m.zeit ? dt + "T" + m.zeit.replace(":", "") + "00" : dt;
  const end = m.zeit ? dt + "T" + String(parseInt(m.zeit) + 2).padStart(2, "0") + m.zeit.slice(3).replace(":", "") + "00" : dt;
  const ics = ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//CHTC//App//DE","BEGIN:VEVENT",
    `UID:chtc-${dt}-${(m.gast || "").replace(/\W/g, "")}@chtc`,
    m.zeit ? `DTSTART:${start}` : `DTSTART;VALUE=DATE:${start}`,
    m.zeit ? `DTEND:${end}` : `DTEND;VALUE=DATE:${start}`,
    `SUMMARY:🏑 ${m.heim} – ${m.gast}`,
    `LOCATION:${(v.name || "") + (v.ort ? ", " + v.ort : "")}`,
    "END:VEVENT","END:VCALENDAR"].join("\r\n");
  return "data:text/calendar;charset=utf-8," + encodeURIComponent(ics);
}

/* ================= Vereins-Infos ================= */
const fmtKurz = (d) => `${String(d.getDate()).padStart(2, "0")}.${String(d.getMonth() + 1).padStart(2, "0")}.`;

function infoView() {
  const inf = DATA.infos || {};
  // Heimspiele dieser Woche (Montag–Sonntag)
  const heute = new Date(); heute.setHours(0, 0, 0, 0);
  const mo = new Date(heute); mo.setDate(heute.getDate() - ((heute.getDay() + 6) % 7));
  const so = new Date(mo); so.setDate(mo.getDate() + 6); so.setHours(23, 59, 59, 0);
  const zeilen = [];
  for (const t of DATA.teams) {
    for (const m of (DATA.matches[t.id] || [])) {
      if (!m.h) continue;
      const d = new Date(m.d + "T12:00");
      if (d >= mo && d <= so) zeilen.push({ t, m, d });
    }
  }
  zeilen.sort((a, b) => ((a.m.d + (a.m.zeit || "99")) < (b.m.d + (b.m.zeit || "99")) ? -1 : 1));
  const rows = zeilen.map(z => `<tr>
      <td style="text-align:left;font-weight:600">${esc(z.t.badge)}</td>
      <td style="white-space:nowrap">${played(z.m) ? `${z.m.th} : ${z.m.tg}` : `${WTAGE[z.d.getDay()].slice(0, 2)} ${z.m.zeit || "–"}`}</td>
      <td style="text-align:left">${esc(short(z.m.gast))}</td></tr>`).join("");
  const heimTabelle = zeilen.length
    ? `<table><tr><th style="text-align:left">Team</th><th>Anstoß</th><th style="text-align:left">Gegner</th></tr>${rows}</table>`
    : `<div class="card"><div class="a" style="color:var(--muted)">Diese Woche keine Heimspiele.</div></div>`;
  const zeitenListe = (z) => (z || []).map(x =>
    `<div class="a" style="display:flex;justify-content:space-between;margin-top:2px"><span>${esc(x[0])}</span><strong>${esc(x[1])}</strong></div>`).join("");
  render(`
    <header><button class="back" onclick="homeView()">‹ Zurück</button>
      <h1>Vereins-Infos</h1><div class="sub">Crefelder HTC · Gerd-Wellen-Anlage</div></header>
    <div class="content">
      <div class="section-label">Diese Woche zuhause (${fmtKurz(mo)} – ${fmtKurz(so)})</div>
      ${heimTabelle}
      <div class="section-label">Anfahrt</div>
      <div class="card"><div class="label">Hockeyplatz</div>
        <div class="a"><strong>${esc((inf.platz || {}).name || "")}</strong><br>${esc((inf.platz || {}).strasse || "")}<br>${esc((inf.platz || {}).ort || "")}</div>
        <div class="btnrow"><a class="btn p" target="_blank" rel="noopener" href="https://maps.apple.com/?q=${encodeURIComponent((inf.platz || {}).maps || "")}">🧭 Route öffnen</a></div></div>
      <div class="section-label">Öffnungszeiten</div>
      <div class="card"><div class="label">${esc((inf.bar || {}).titel || "Hockeybar")}</div>${zeitenListe((inf.bar || {}).zeiten)}
        ${(inf.bar || {}).kontakt ? `<div class="a" style="margin-top:8px;color:var(--muted)">${esc(inf.bar.kontakt)}</div>` : ""}</div>
      ${(inf.shops || (inf.shop ? [inf.shop] : [])).map(s => `
      <div class="card"><div class="label">${esc(s.titel || "Hockeyshop")}</div>
        ${s.adresse ? `<div class="a" style="margin-bottom:4px">${esc(s.adresse)}</div>` : ""}${zeitenListe(s.zeiten)}
        ${s.hinweis ? `<div class="a" style="margin-top:8px;color:var(--muted);font-size:12px">${esc(s.hinweis)}</div>` : ""}
        ${s.kontakt ? `<div class="a" style="color:var(--muted)">${esc(s.kontakt)}</div>` : ""}</div>`).join("")}
    </div>`);
}
window.infoView = infoView;

/* ================= Aktionen ================= */
window.openTeam = (id, tab) => teamView(id, tab);
window.detailView = detailView;
window.homeView = homeView;
window.toggleFav = (ev, id) => {
  ev.stopPropagation();
  favs = favs.includes(id) ? favs.filter(x => x !== id) : [...favs, id];
  store("chtc_favs", favs);
  homeView();
};

/* ================= Start ================= */
homeView();
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});

/* Live-Daten laden: data.json wird von GitHub Actions automatisch aktualisiert.
   Eingebaute Daten oben dienen nur noch als Fallback (z. B. komplett offline). */
fetch("data.json?t=" + Date.now())
  .then((r) => (r.ok ? r.json() : null))
  .then((d) => {
    if (d && Array.isArray(d.teams) && d.teams.length) {
      Object.assign(DATA, d);
      homeView();
    }
  })
  .catch(() => {});
</script>
</body>
</html>
